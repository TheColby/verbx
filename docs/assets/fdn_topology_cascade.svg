<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1840 1040" role="img" aria-labelledby="title desc">
  <title id="title">Nested/Cascaded FDN Graph (verbx)</title>
  <desc id="desc">Legible orthogonal graph: diffused input drives both nested fast FDN and primary FDN; nested feedback is injected into primary feedback via configurable cascade mix and timing/decay ratios.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#edf4fd"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#294266"/>
    </marker>
    <style>
      .panel { fill: #ffffff; stroke: #d4e2f4; stroke-width: 2.2; }
      .group { fill: #f2f8ff; stroke: #6b87ad; stroke-width: 2.1; }
      .card { fill: url(#card); stroke: #708aae; stroke-width: 2; }
      .line { fill: none; stroke: #294266; stroke-width: 3.1; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #587ca7; stroke-width: 2.7; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #4f739f; stroke-width: 2.4; stroke-dasharray: 10 7; marker-end: url(#arrow); }
      .title { fill: #132842; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 36px; font-weight: 700; }
      .subtitle { fill: #2d4d79; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; }
      .h2 { fill: #173153; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 23px; font-weight: 700; }
      .label { fill: #173153; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .small { fill: #34547f; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 15px; }
      .mono { font-family: "Menlo", "Consolas", monospace; }
      .notebox { fill: #f5f9ff; stroke: #d8e4f6; stroke-width: 2; }
    </style>
  </defs>

  <rect x="0" y="0" width="1840" height="1040" fill="url(#bg)"/>
  <rect class="panel" x="52" y="66" width="1736" height="910" rx="18"/>

  <text class="title" x="90" y="126">Nested/Cascaded FDN Topology (Legible Layout)</text>
  <text class="subtitle" x="90" y="158">Enabled by <tspan class="mono">--fdn-cascade</tspan>; nested network enriches density while primary network sets long-tail character.</text>

  <rect class="card" x="100" y="220" width="220" height="92" rx="12"/>
  <text class="label" x="210" y="273" text-anchor="middle">Diffused Input</text>

  <rect class="group" x="360" y="180" width="560" height="360" rx="14"/>
  <text class="h2" x="392" y="222">Nested Fast FDN</text>

  <rect class="card" x="400" y="260" width="180" height="90" rx="12"/>
  <text class="label" x="490" y="312" text-anchor="middle">Fast Delays</text>

  <rect class="card" x="640" y="260" width="200" height="90" rx="12"/>
  <text class="label" x="740" y="312" text-anchor="middle">Cascade M, G</text>

  <rect class="card" x="520" y="400" width="220" height="90" rx="12"/>
  <text class="label" x="630" y="452" text-anchor="middle">cascade_feedback[n]</text>

  <rect class="group" x="980" y="180" width="760" height="560" rx="14"/>
  <text class="h2" x="1012" y="222">Primary Late FDN</text>

  <rect class="card" x="1030" y="260" width="200" height="90" rx="12"/>
  <text class="label" x="1130" y="312" text-anchor="middle">Delay Reads</text>

  <rect class="card" x="1280" y="260" width="220" height="90" rx="12"/>
  <text class="label" x="1390" y="312" text-anchor="middle">Filters + Matrix</text>

  <rect class="card" x="1550" y="260" width="90" height="90" rx="12"/>
  <text class="label" x="1595" y="312" text-anchor="middle">G</text>

  <circle cx="1600" cy="440" r="34" fill="#ffffff" stroke="#5f7da6" stroke-width="2.2"/>
  <text class="label" x="1600" y="448" text-anchor="middle">+</text>

  <rect class="card" x="1260" y="390" width="250" height="100" rx="12"/>
  <text class="label" x="1385" y="436" text-anchor="middle">Injection u[n]/sqrt(N)</text>
  <text class="small" x="1385" y="460" text-anchor="middle">plus nested contribution</text>

  <rect class="card" x="1320" y="560" width="200" height="90" rx="12"/>
  <text class="label" x="1420" y="612" text-anchor="middle">Wet Tap</text>

  <rect class="card" x="1570" y="560" width="130" height="90" rx="12"/>
  <text class="label" x="1635" y="612" text-anchor="middle">Wet Post</text>

  <rect class="card" x="100" y="830" width="220" height="90" rx="12"/>
  <text class="label" x="210" y="882" text-anchor="middle">Dry Tap</text>

  <rect class="card" x="1250" y="820" width="260" height="110" rx="12"/>
  <text class="label" x="1380" y="865" text-anchor="middle">Wet / Dry Mix</text>
  <text class="small" x="1380" y="888" text-anchor="middle"><tspan class="mono">--wet --dry</tspan></text>

  <rect class="card" x="1560" y="840" width="190" height="90" rx="12"/>
  <text class="label" x="1655" y="892" text-anchor="middle">Output</text>

  <!-- Input fan-out -->
  <path class="line" d="M320,266 H360 V305 H400"/>
  <path class="line" d="M320,266 V140 H1030 V305"/>

  <!-- Nested path -->
  <path class="line" d="M580,305 H640"/>
  <path class="line" d="M740,350 V400 H630"/>
  <path class="loop" d="M630,490 H390 V305 H400"/>

  <!-- Nested to primary injection -->
  <path class="line-soft" d="M740,445 H1260 V440"/>

  <!-- Primary path -->
  <path class="line" d="M1230,305 H1280"/>
  <path class="line" d="M1500,305 H1550"/>
  <path class="line" d="M1595,350 V406"/>
  <path class="line" d="M1510,440 H1566"/>
  <path class="loop" d="M1634,440 V700 H1070 V350 H1030"/>

  <!-- Wet path to output -->
  <path class="line" d="M1390,350 V560 H1420"/>
  <path class="line" d="M1520,605 H1570"/>
  <path class="line" d="M1635,650 V875 H1510"/>

  <!-- Dry path to output -->
  <path class="line" d="M210,312 V875"/>
  <path class="line" d="M320,875 H1250"/>
  <path class="line" d="M1510,875 H1560"/>

  <rect class="notebox" x="100" y="950" width="1650" height="68" rx="12"/>
  <text class="small" x="130" y="978"><tspan class="mono">--fdn-cascade-mix</tspan>: nested contribution strength into primary feedback.</text>
  <text class="small" x="130" y="1000"><tspan class="mono">--fdn-cascade-delay-scale</tspan> and <tspan class="mono">--fdn-cascade-rt60-ratio</tspan>: nested timing/decay relative to primary network.</text>
</svg>
