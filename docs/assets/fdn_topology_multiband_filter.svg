<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1840 1020" role="img" aria-labelledby="title desc">
  <title id="title">Multiband + Filter-Feedback FDN Graph (verbx)</title>
  <desc id="desc">Legible orthogonal graph of in-loop feedback-link filtering and optional multiband decay shaping in the FDN feedback path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#edf4fd"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#294266"/>
    </marker>
    <style>
      .panel { fill: #ffffff; stroke: #d4e2f4; stroke-width: 2.2; }
      .group { fill: #f2f8ff; stroke: #6b87ad; stroke-width: 2.1; }
      .card { fill: url(#card); stroke: #708aae; stroke-width: 2; }
      .line { fill: none; stroke: #294266; stroke-width: 3.1; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #5b7ca6; stroke-width: 2.6; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #4f739f; stroke-width: 2.4; stroke-dasharray: 10 7; marker-end: url(#arrow); }
      .title { fill: #132842; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 36px; font-weight: 700; }
      .subtitle { fill: #2d4d79; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; }
      .h2 { fill: #173153; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 23px; font-weight: 700; }
      .label { fill: #173153; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .small { fill: #34547f; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 15px; }
      .mono { font-family: "Menlo", "Consolas", monospace; }
      .notebox { fill: #f5f9ff; stroke: #d8e4f6; stroke-width: 2; }
    </style>
  </defs>

  <rect x="0" y="0" width="1840" height="1020" fill="url(#bg)"/>
  <rect class="panel" x="52" y="66" width="1736" height="888" rx="18"/>

  <text class="title" x="90" y="126">Filter-Feedback + Multiband FDN Shaping (Legible Layout)</text>
  <text class="subtitle" x="90" y="158">Optional spectral controls inside the feedback loop after matrix mixing.</text>

  <!-- Main chain -->
  <rect class="card" x="100" y="250" width="220" height="92" rx="12"/>
  <text class="label" x="210" y="302" text-anchor="middle">fdn_out[n]</text>

  <rect class="card" x="390" y="250" width="300" height="92" rx="12"/>
  <text class="label" x="540" y="292" text-anchor="middle">Feedback-Link Filter</text>
  <text class="small" x="540" y="316" text-anchor="middle"><tspan class="mono">--fdn-link-filter{,-hz,-mix}</tspan></text>

  <rect class="card" x="760" y="250" width="220" height="92" rx="12"/>
  <text class="label" x="870" y="302" text-anchor="middle">Matrix M</text>

  <rect class="group" x="1040" y="190" width="700" height="500" rx="14"/>
  <text class="h2" x="1072" y="230">Optional Multiband Decay Stage</text>

  <rect class="card" x="1080" y="270" width="200" height="88" rx="12"/>
  <text class="label" x="1180" y="320" text-anchor="middle">Low-Pass 1</text>

  <rect class="card" x="1360" y="270" width="200" height="88" rx="12"/>
  <text class="label" x="1460" y="320" text-anchor="middle">Low-Pass 2</text>

  <rect class="card" x="1160" y="410" width="300" height="92" rx="12"/>
  <text class="label" x="1310" y="452" text-anchor="middle">Band Decomposition</text>
  <text class="small" x="1310" y="476" text-anchor="middle">low / mid / high</text>

  <rect class="card" x="1520" y="410" width="180" height="92" rx="12"/>
  <text class="label" x="1610" y="452" text-anchor="middle">Per-Band Gains</text>
  <text class="small" x="1610" y="476" text-anchor="middle">G_low / G_mid / G_high</text>

  <rect class="card" x="1520" y="540" width="180" height="92" rx="12"/>
  <text class="label" x="1610" y="592" text-anchor="middle">Shaped Feedback</text>

  <circle cx="1610" cy="740" r="34" fill="#ffffff" stroke="#5f7da6" stroke-width="2.2"/>
  <text class="label" x="1610" y="748" text-anchor="middle">+</text>

  <rect class="card" x="1060" y="694" width="250" height="92" rx="12"/>
  <text class="label" x="1185" y="744" text-anchor="middle">Injection u[n]/sqrt(N)</text>

  <rect class="card" x="1670" y="694" width="90" height="92" rx="12"/>
  <text class="label" x="1715" y="746" text-anchor="middle">Write</text>

  <!-- Main linear flow -->
  <path class="line" d="M320,296 H390"/>
  <path class="line" d="M690,296 H760"/>

  <!-- Into multiband stage -->
  <path class="line" d="M980,296 H1080"/>
  <path class="line" d="M1280,314 H1360"/>
  <path class="line" d="M1180,358 V410"/>
  <path class="line" d="M1460,358 V410"/>
  <path class="line" d="M1460,456 H1520"/>
  <path class="line" d="M1610,502 V540"/>

  <!-- Bypass (multiband disabled) -->
  <path class="line-soft" d="M980,296 H1610 V706"/>

  <!-- Sum and write -->
  <path class="line" d="M1610,632 V706"/>
  <path class="line" d="M1310,740 H1576"/>
  <path class="line" d="M1644,740 H1670"/>

  <!-- Feedback loop -->
  <path class="loop" d="M1715,786 V870 H210 V342"/>

  <rect class="notebox" x="100" y="900" width="1660" height="46" rx="12"/>
  <text class="small" x="128" y="928"><tspan class="mono">--fdn-rt60-low/mid/high --fdn-xover-low-hz --fdn-xover-high-hz</tspan> enable multiband shaping; <tspan class="mono">--fdn-link-filter*</tspan> enables in-loop filter-feedback.</text>
</svg>
