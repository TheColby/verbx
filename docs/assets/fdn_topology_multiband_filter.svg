<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1840 1020" role="img" aria-labelledby="title desc">
  <title id="title">Multiband + Filter-Feedback FDN Graph (verbx)</title>
  <desc id="desc">Graph showing optional feedback-link filter and low-mid-high multiband gain shaping in the FDN loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#edf4fd"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#294266"/>
    </marker>
    <style>
      .panel { fill: #ffffff; stroke: #d4e2f4; stroke-width: 2; }
      .card { fill: #fbfdff; stroke: #708aae; stroke-width: 2; }
      .soft { fill: #f2f8ff; stroke: #6b87ad; stroke-width: 2; }
      .line { fill: none; stroke: #294266; stroke-width: 3; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #5b7ca6; stroke-width: 2.5; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #4f739f; stroke-width: 2.2; stroke-dasharray: 9 7; marker-end: url(#arrow); }
      .title { fill: #132842; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 34px; font-weight: 700; }
      .subtitle { fill: #2d4d79; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; }
      .label { fill: #173153; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .small { fill: #34547f; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 15px; }
      .mono { font-family: "Menlo", "Consolas", monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="1840" height="1020" fill="url(#bg)"/>
  <rect class="panel" x="52" y="66" width="1736" height="888" rx="18"/>

  <text class="title" x="90" y="126">Filter-Feedback + Multiband FDN Shaping</text>
  <text class="subtitle" x="90" y="158">Optional spectral controls in the feedback path after matrix mixing</text>

  <rect class="card" x="112" y="262" width="208" height="96" rx="12"/>
  <text class="label" x="216" y="318" text-anchor="middle">fdn_out[n]</text>

  <rect class="card" x="374" y="262" width="286" height="96" rx="12"/>
  <text class="label" x="517" y="304" text-anchor="middle">Feedback-Link Filter</text>
  <text class="small" x="517" y="328" text-anchor="middle"><tspan class="mono">--fdn-link-filter{,-hz,-mix}</tspan></text>

  <rect class="card" x="714" y="262" width="232" height="96" rx="12"/>
  <text class="label" x="830" y="318" text-anchor="middle">Matrix M</text>

  <rect class="soft" x="998" y="210" width="734" height="430" rx="14"/>
  <text class="label" x="1032" y="252">Optional Multiband Decay Stage</text>

  <rect class="card" x="1048" y="292" width="214" height="92" rx="12"/>
  <text class="label" x="1155" y="344" text-anchor="middle">Low-Pass 1</text>
  <text class="small" x="1155" y="366" text-anchor="middle">low band state</text>

  <rect class="card" x="1310" y="292" width="214" height="92" rx="12"/>
  <text class="label" x="1417" y="344" text-anchor="middle">Low-Pass 2</text>
  <text class="small" x="1417" y="366" text-anchor="middle">mid split helper</text>

  <rect class="card" x="1108" y="430" width="356" height="98" rx="12"/>
  <text class="label" x="1286" y="472" text-anchor="middle">Band Decomposition</text>
  <text class="small" x="1286" y="496" text-anchor="middle">low, mid, high components</text>

  <rect class="card" x="1508" y="430" width="198" height="98" rx="12"/>
  <text class="label" x="1607" y="472" text-anchor="middle">Per-Band Gains</text>
  <text class="small" x="1607" y="496" text-anchor="middle">G_low / G_mid / G_high</text>

  <rect class="card" x="1312" y="564" width="238" height="92" rx="12"/>
  <text class="label" x="1431" y="614" text-anchor="middle">Shaped Feedback</text>

  <circle cx="1592" cy="610" r="34" fill="#ffffff" stroke="#5f7da6" stroke-width="2.2"/>
  <text class="label" x="1592" y="618" text-anchor="middle">+</text>
  <rect class="card" x="1650" y="564" width="96" height="92" rx="12"/>
  <text class="label" x="1698" y="614" text-anchor="middle">Write</text>

  <rect class="card" x="1028" y="708" width="250" height="92" rx="12"/>
  <text class="label" x="1153" y="758" text-anchor="middle">Injection u[n]/sqrt(N)</text>

  <path class="line" d="M320,310 L374,310"/>
  <path class="line" d="M660,310 L714,310"/>
  <path class="line" d="M946,310 L1048,338"/>
  <path class="line" d="M1262,338 L1310,338"/>
  <path class="line" d="M1417,384 L1417,430"/>
  <path class="line" d="M1262,384 L1262,430"/>
  <path class="line" d="M1464,478 L1508,478"/>
  <path class="line" d="M1607,528 L1607,610 L1558,610"/>
  <path class="line" d="M1550,610 L1650,610"/>
  <path class="line" d="M1278,754 L1348,656"/>
  <path class="loop" d="M1698,656 L1698,836 L216,836 L216,358"/>

  <rect class="panel" x="112" y="856" width="1634" height="78" rx="12"/>
  <text class="small" x="144" y="904">Multiband mode uses <tspan class="mono">--fdn-rt60-low/mid/high</tspan> plus crossover controls. Filter-feedback uses <tspan class="mono">--fdn-link-filter*</tspan>. Both can be active together.</text>
</svg>
