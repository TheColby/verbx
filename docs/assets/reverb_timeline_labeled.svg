<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Labeled Reverb Envelope Graph</title>
  <desc id="desc">Amplitude versus time graph showing dry peak, pre-delay, early reflections, wash tail, and RT60.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9fbff"/>
      <stop offset="100%" stop-color="#eef3fb"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#233044"/>
    </marker>
    <style>
      .label { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #1f2a3a; }
      .small { font-size: 20px; }
      .med { font-size: 24px; font-weight: 600; }
      .axis { stroke: #233044; stroke-width: 3; }
      .grid { stroke: #cfd9ea; stroke-width: 1.5; }
      .marker { stroke: #7f8fa8; stroke-width: 2; stroke-dasharray: 8 8; }
      .envelope { stroke: #215dff; stroke-width: 7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .reflection { fill: #4b7bff; opacity: 0.85; }
      .stage { fill: #0d1e3a; font-size: 22px; font-weight: 700; }
      .axisTitle { fill: #233044; font-size: 26px; font-weight: 700; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="760" fill="url(#bg)"/>

  <!-- Plot area -->
  <rect x="120" y="90" width="1160" height="560" fill="#ffffff" stroke="#dde6f4" stroke-width="2"/>

  <!-- Horizontal grid -->
  <line class="grid" x1="120" y1="650" x2="1280" y2="650"/>
  <line class="grid" x1="120" y1="540" x2="1280" y2="540"/>
  <line class="grid" x1="120" y1="430" x2="1280" y2="430"/>
  <line class="grid" x1="120" y1="320" x2="1280" y2="320"/>
  <line class="grid" x1="120" y1="210" x2="1280" y2="210"/>
  <line class="grid" x1="120" y1="100" x2="1280" y2="100"/>

  <!-- Axes -->
  <line class="axis" x1="120" y1="650" x2="1280" y2="650" marker-end="url(#arrow)"/>
  <line class="axis" x1="120" y1="650" x2="120" y2="90" marker-end="url(#arrow)"/>

  <!-- Stage markers -->
  <line class="marker" x1="170" y1="650" x2="170" y2="95"/>
  <line class="marker" x1="320" y1="650" x2="320" y2="95"/>
  <line class="marker" x1="520" y1="650" x2="520" y2="95"/>
  <line class="marker" x1="1120" y1="650" x2="1120" y2="95"/>

  <!-- Reverb envelope -->
  <path class="envelope" d="
    M 120 650
    L 150 180
    L 195 300
    L 260 360
    L 320 380
    L 390 410
    L 470 445
    L 560 485
    L 660 520
    L 780 560
    L 920 595
    L 1040 625
    L 1120 640
    L 1240 648
  "/>

  <!-- Early reflection pulses -->
  <rect class="reflection" x="340" y="430" width="8" height="120" rx="3"/>
  <rect class="reflection" x="365" y="450" width="8" height="100" rx="3"/>
  <rect class="reflection" x="392" y="470" width="8" height="80" rx="3"/>
  <rect class="reflection" x="418" y="485" width="8" height="65" rx="3"/>
  <rect class="reflection" x="445" y="500" width="8" height="50" rx="3"/>

  <!-- Axis labels -->
  <text class="label axisTitle" x="42" y="112" transform="rotate(-90 42 112)">Amplitude</text>
  <text class="label axisTitle" x="1160" y="707">Time</text>

  <!-- Tick labels -->
  <text class="label small" x="108" y="675">0</text>
  <text class="label small" x="156" y="675">0 ms</text>
  <text class="label small" x="270" y="675">10-80 ms</text>
  <text class="label small" x="468" y="675">120 ms</text>
  <text class="label small" x="1088" y="675">RT60</text>
  <text class="label small" x="85" y="652">0.0</text>
  <text class="label small" x="85" y="542">0.2</text>
  <text class="label small" x="85" y="432">0.4</text>
  <text class="label small" x="85" y="322">0.6</text>
  <text class="label small" x="85" y="212">0.8</text>
  <text class="label small" x="85" y="102">1.0</text>

  <!-- Stage labels -->
  <text class="label stage" x="175" y="165">Dry Peak</text>
  <text class="label stage" x="245" y="250">Pre-delay</text>
  <text class="label stage" x="335" y="405">Early Reflections</text>
  <text class="label stage" x="690" y="515">Wash / Late Tail</text>

  <!-- Legend -->
  <rect x="870" y="120" width="360" height="120" rx="12" fill="#f3f7ff" stroke="#d9e4f8" stroke-width="2"/>
  <line x1="900" y1="160" x2="980" y2="160" class="envelope" style="stroke-width:5"/>
  <text class="label small" x="1000" y="167">Reverb envelope</text>
  <rect class="reflection" x="900" y="185" width="8" height="28" rx="3"/>
  <text class="label small" x="1000" y="205">Early reflection pulses</text>
</svg>
