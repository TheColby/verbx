<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 1160" role="img" aria-labelledby="title desc">
  <title id="title">FDN Matrix Family Graph (verbx)</title>
  <desc id="desc">Graph of selectable feedback matrix families for verbx FDN, showing static families and time-varying unitary mode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#edf4fd"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#294266"/>
    </marker>
    <style>
      .panel { fill: #ffffff; stroke: #d4e2f4; stroke-width: 2.1; }
      .card { fill: #fbfdff; stroke: #708aae; stroke-width: 2; }
      .soft { fill: #f2f8ff; stroke: #6b87ad; stroke-width: 2; }
      .line { fill: none; stroke: #294266; stroke-width: 3; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #5c7ca7; stroke-width: 2.4; marker-end: url(#arrow); }
      .title { fill: #132842; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 35px; font-weight: 700; }
      .subtitle { fill: #2d4d79; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; }
      .h2 { fill: #173153; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 700; }
      .label { fill: #193457; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .small { fill: #34547f; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 15px; }
      .mono { font-family: "Menlo", "Consolas", monospace; }
      .note { fill: #213f67; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 16px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1900" height="1160" fill="url(#bg)"/>
  <rect class="panel" x="52" y="72" width="1796" height="1040" rx="20"/>

  <text class="title" x="92" y="132">FDN Matrix Family Selection Graph</text>
  <text class="subtitle" x="92" y="166">Selectable via <tspan class="mono">--fdn-matrix</tspan> in render and <tspan class="mono">ir gen --mode fdn|hybrid</tspan></text>

  <rect class="soft" x="92" y="212" width="1716" height="396" rx="16"/>
  <text class="h2" x="124" y="252">Static orthonormal families</text>

  <rect class="card" x="140" y="302" width="226" height="100" rx="12"/>
  <text class="label" x="253" y="358" text-anchor="middle">hadamard</text>

  <rect class="card" x="420" y="302" width="226" height="100" rx="12"/>
  <text class="label" x="533" y="358" text-anchor="middle">householder</text>

  <rect class="card" x="700" y="302" width="256" height="100" rx="12"/>
  <text class="label" x="828" y="358" text-anchor="middle">random_orthogonal</text>

  <rect class="card" x="1010" y="302" width="226" height="100" rx="12"/>
  <text class="label" x="1123" y="358" text-anchor="middle">circulant</text>

  <rect class="card" x="1290" y="302" width="226" height="100" rx="12"/>
  <text class="label" x="1403" y="358" text-anchor="middle">elliptic</text>

  <rect class="soft" x="1560" y="282" width="216" height="140" rx="12"/>
  <text class="small" x="1668" y="332" text-anchor="middle">all static families are</text>
  <text class="small" x="1668" y="355" text-anchor="middle">orthonormalized before</text>
  <text class="small" x="1668" y="378" text-anchor="middle">feedback mixing</text>

  <path class="line" d="M253,402 L253,468 L950,468"/>
  <path class="line" d="M533,402 L533,468"/>
  <path class="line" d="M828,402 L828,468"/>
  <path class="line" d="M1123,402 L1123,468"/>
  <path class="line" d="M1403,402 L1403,468"/>

  <rect class="card" x="876" y="468" width="244" height="92" rx="12"/>
  <text class="label" x="998" y="520" text-anchor="middle">FDN Matrix M</text>

  <rect class="soft" x="92" y="642" width="1716" height="386" rx="16"/>
  <text class="h2" x="124" y="682">Time-varying unitary family</text>

  <rect class="card" x="140" y="736" width="252" height="100" rx="12"/>
  <text class="label" x="266" y="792" text-anchor="middle">tv_unitary</text>

  <rect class="card" x="442" y="736" width="320" height="100" rx="12"/>
  <text class="small" x="602" y="782" text-anchor="middle">base matrix (Hadamard-derived)</text>
  <text class="small" x="602" y="806" text-anchor="middle">target matrix (seeded random Q)</text>

  <rect class="card" x="812" y="736" width="252" height="100" rx="12"/>
  <text class="small" x="938" y="782" text-anchor="middle">blend by phase, rate, depth</text>
  <text class="small" x="938" y="806" text-anchor="middle">then re-orthonormalize</text>

  <rect class="card" x="1114" y="736" width="300" height="100" rx="12"/>
  <text class="small" x="1264" y="782" text-anchor="middle"><tspan class="mono">--fdn-tv-rate-hz &gt; 0</tspan></text>
  <text class="small" x="1264" y="806" text-anchor="middle"><tspan class="mono">--fdn-tv-depth &gt; 0</tspan></text>

  <rect class="card" x="1474" y="736" width="286" height="100" rx="12"/>
  <text class="label" x="1617" y="792" text-anchor="middle">M(t) in feedback loop</text>

  <path class="line" d="M392,786 L442,786"/>
  <path class="line" d="M762,786 L812,786"/>
  <path class="line" d="M1064,786 L1114,786"/>
  <path class="line" d="M1414,786 L1474,786"/>

  <rect class="panel" x="130" y="884" width="1640" height="120" rx="12"/>
  <text class="note" x="162" y="934">Alias support: <tspan class="mono">tv_unitary</tspan> and <tspan class="mono">tv-unitary</tspan> resolve to the same topology key.</text>
  <text class="note" x="162" y="962">All families are applied in the same FDN render core; only the matrix construction/evolution changes.</text>
</svg>
