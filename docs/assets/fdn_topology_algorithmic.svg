<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 1180" role="img" aria-labelledby="title desc">
  <title id="title">Algorithmic Render Topology (verbx)</title>
  <desc id="desc">Orthogonal signal-flow diagram for algorithmic rendering: input, pre-delay, allpass diffusion, FDN late core with optional DFM branch, wet processing, wet dry mix, and output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4fc"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#234064"/>
    </marker>
    <style>
      .panel { fill: #ffffff; stroke: #d5e2f4; stroke-width: 2.2; }
      .card { fill: url(#card); stroke: #6f89ad; stroke-width: 2; }
      .core { fill: #f2f8ff; stroke: #5b7ca7; stroke-width: 2.4; }
      .line { fill: none; stroke: #234064; stroke-width: 3.1; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #5a7ba5; stroke-width: 2.6; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #4f739f; stroke-width: 2.4; stroke-dasharray: 10 7; marker-end: url(#arrow); }
      .title { fill: #102640; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 37px; font-weight: 700; }
      .subtitle { fill: #304f79; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; }
      .h2 { fill: #173153; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .label { fill: #173153; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .small { fill: #2f4f78; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 15px; }
      .mono { font-family: "Menlo", "Consolas", monospace; }
      .eq { fill: #163052; font-family: "Menlo", "Consolas", monospace; font-size: 14px; }
      .legend { fill: #f5f9ff; stroke: #d8e4f6; stroke-width: 2; }
      .badge { fill: #eaf3ff; stroke: #c5d8f1; stroke-width: 1.8; }
      .badge-text { fill: #2d4f79; font-family: "Menlo", "Consolas", monospace; font-size: 13px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1900" height="1180" fill="url(#bg)"/>
  <rect class="panel" x="52" y="72" width="1796" height="1062" rx="20"/>

  <text class="title" x="92" y="132">Algorithmic Render Topology (Orthogonal)</text>
  <text class="subtitle" x="92" y="166">Path implemented in <tspan class="mono">src/verbx/core/algo_reverb.py</tspan> for <tspan class="mono">verbx render --engine algo</tspan></text>

  <rect class="card" x="100" y="220" width="200" height="90" rx="12"/>
  <text class="label" x="200" y="273" text-anchor="middle">Input</text>

  <rect class="card" x="360" y="220" width="230" height="90" rx="12"/>
  <text class="label" x="475" y="264" text-anchor="middle">Pre-delay</text>
  <text class="small" x="475" y="286" text-anchor="middle"><tspan class="mono">--pre-delay-ms</tspan></text>

  <rect class="card" x="650" y="208" width="310" height="114" rx="12"/>
  <text class="label" x="805" y="252" text-anchor="middle">Allpass Diffusion</text>
  <text class="small" x="805" y="274" text-anchor="middle"><tspan class="mono">--allpass-stages --allpass-gain</tspan></text>
  <text class="small" x="805" y="294" text-anchor="middle"><tspan class="mono">--allpass-delays-ms</tspan></text>

  <path class="line" d="M300,265 H360"/>
  <path class="line" d="M590,265 H650"/>

  <rect class="core" x="980" y="170" width="840" height="700" rx="16"/>
  <text class="h2" x="1012" y="214">FDN Late Core (per channel)</text>

  <rect class="card" x="1170" y="234" width="260" height="56" rx="10"/>
  <text class="small" x="1300" y="267" text-anchor="middle">Injection u[n] / sqrt(N)</text>

  <rect class="card" x="1020" y="300" width="180" height="90" rx="10"/>
  <text class="label" x="1110" y="352" text-anchor="middle">Delay Reads</text>

  <rect class="card" x="1260" y="300" width="190" height="90" rx="10"/>
  <text class="label" x="1355" y="340" text-anchor="middle">Loop Filters</text>
  <text class="small" x="1355" y="362" text-anchor="middle">LP + DC block</text>

  <rect class="card" x="1500" y="300" width="170" height="90" rx="10"/>
  <text class="label" x="1585" y="340" text-anchor="middle">Matrix M</text>
  <text class="small" x="1585" y="362" text-anchor="middle">selectable family</text>

  <rect class="card" x="1720" y="300" width="80" height="90" rx="10"/>
  <text class="label" x="1760" y="340" text-anchor="middle">G</text>
  <text class="small" x="1760" y="362" text-anchor="middle">RT60</text>

  <circle cx="1760" cy="500" r="34" fill="#ffffff" stroke="#5f7da6" stroke-width="2.2"/>
  <text class="label" x="1760" y="508" text-anchor="middle">+</text>

  <rect class="card" x="1490" y="450" width="190" height="90" rx="10"/>
  <text class="label" x="1585" y="490" text-anchor="middle">Optional DFM</text>
  <text class="small" x="1585" y="512" text-anchor="middle"><tspan class="mono">--fdn-dfm-delays-ms</tspan></text>

  <path class="line" d="M960,265 H1170"/>
  <path class="line" d="M1430,262 H1760 V466"/>

  <path class="line" d="M1200,345 H1260"/>
  <path class="line" d="M1450,345 H1500"/>
  <path class="line" d="M1670,345 H1720"/>
  <path class="line" d="M1760,390 V466"/>

  <path class="line-soft" d="M1585,390 V450"/>
  <path class="line-soft" d="M1680,495 H1726"/>

  <path class="loop" d="M1760,534 V620 H1000 V345 H1020"/>
  <text class="small" x="1362" y="642" text-anchor="middle">feedback write: x_fb[n+1] -&gt; delay lines</text>

  <rect class="card" x="1240" y="690" width="220" height="96" rx="10"/>
  <text class="label" x="1350" y="741" text-anchor="middle">Wet Tap</text>
  <text class="small" x="1350" y="763" text-anchor="middle">mean(line outputs)</text>

  <rect class="card" x="1500" y="690" width="220" height="96" rx="10"/>
  <text class="label" x="1610" y="734" text-anchor="middle">Wet Post</text>
  <text class="small" x="1610" y="757" text-anchor="middle">width + shimmer</text>

  <path class="line" d="M1355,390 V690"/>
  <path class="line" d="M1460,738 H1500"/>

  <rect class="card" x="250" y="900" width="230" height="90" rx="12"/>
  <text class="label" x="365" y="952" text-anchor="middle">Dry Tap</text>

  <rect class="card" x="1280" y="886" width="250" height="116" rx="12"/>
  <text class="label" x="1405" y="934" text-anchor="middle">Wet / Dry Mix</text>
  <text class="small" x="1405" y="958" text-anchor="middle"><tspan class="mono">--wet --dry</tspan></text>

  <rect class="card" x="1580" y="905" width="210" height="90" rx="12"/>
  <text class="label" x="1685" y="958" text-anchor="middle">Output</text>

  <path class="line" d="M200,310 V945 H250"/>
  <path class="line" d="M480,945 H1280"/>
  <path class="line" d="M1610,786 V886"/>
  <path class="line" d="M1530,944 H1580"/>

  <text class="eq" x="1010" y="898">q[n] = delay_read(x_fb[n])</text>
  <text class="eq" x="1010" y="920">r[n] = D(q[n])</text>
  <text class="eq" x="1010" y="942">m[n] = M r[n]</text>
  <text class="eq" x="1010" y="964">x_fb[n+1] = u[n]/sqrt(N) + G m[n] (with optional DFM delay branch)</text>

  <rect class="legend" x="92" y="1032" width="1708" height="84" rx="12"/>
  <rect class="badge" x="120" y="1052" width="286" height="44" rx="8"/>
  <text class="badge-text" x="263" y="1080" text-anchor="middle">matrix: hadamard|householder|random_orthogonal|circulant|elliptic|tv_unitary</text>
  <text class="small" x="442" y="1079">Use <tspan class="mono">--fdn-tv-rate-hz</tspan> and <tspan class="mono">--fdn-tv-depth</tspan> when matrix is <tspan class="mono">tv_unitary</tspan>.</text>
</svg>
