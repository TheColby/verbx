<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
<title id="title">Clamped plate finite element grid</title><desc id="desc">Structured plate grid with fixed edges and off centre drive and pickup nodes.</desc>
<rect width="960" height="440" fill="#f8fafc"/><text x="45" y="42" font-family="Arial" font-size="25" font-weight="bold" fill="#152338">Structured mass-lumped plate grid</text><text x="45" y="68" font-family="Arial" font-size="15" fill="#43536a">Fixed-edge displacement, discrete bending stiffness, optional tension, and interpolated pickup.</text>
<rect x="110" y="105" width="610" height="255" fill="#e6eef5" stroke="#152338" stroke-width="8"/><g stroke="#6d8aa8" stroke-width="2"><path d="M171 105v255M232 105v255M293 105v255M354 105v255M415 105v255M476 105v255M537 105v255M598 105v255M659 105v255M110 145h610M110 185h610M110 225h610M110 265h610M110 305h610"/></g>
<g fill="#34a0a4" stroke="#1a5f70" stroke-width="2"><circle cx="293" cy="265" r="11"/><circle cx="598" cy="185" r="11"/></g><g stroke="#e76f51" stroke-width="3"><path d="M293 265v78M598 185v-68"/></g><g font-family="Arial" font-size="16" fill="#152338"><text x="245" y="350" fill="#c44f35">drive e(xd, yd)</text><text x="548" y="102" fill="#c44f35">pickup p(xp, yp)</text><text x="755" y="175">D L^T L</text><text x="755" y="202">bending</text><text x="755" y="270">T L</text><text x="755" y="297">tension</text><text x="110" y="405">Each interior node has mass rho h dx dy; border clamp is the heavy frame.</text></g>
</svg>
