<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 1080" role="img" aria-labelledby="title desc">
  <title id="title">FDN TV-Unitary and DFM Feedback Graph</title>
  <desc id="desc">Detailed graph of advanced feedback path: matrix evolution over time and optional delay feedback matrix branch.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4fc"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#274266"/>
    </marker>
    <style>
      .panel { fill: #ffffff; stroke: #d4e2f4; stroke-width: 2.2; }
      .card { fill: #fbfdff; stroke: #6e89ad; stroke-width: 2; }
      .soft { fill: #f2f8ff; stroke: #6c87ac; stroke-width: 2; }
      .line { fill: none; stroke: #274266; stroke-width: 3.1; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #51769f; stroke-width: 2.6; stroke-dasharray: 11 7; marker-end: url(#arrow); }
      .title { fill: #132941; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 35px; font-weight: 700; }
      .subtitle { fill: #2e4d79; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; }
      .h2 { fill: #163154; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 23px; font-weight: 700; }
      .label { fill: #1a3657; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .small { fill: #35557e; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 15px; }
      .mono { font-family: "Menlo", "Consolas", monospace; }
      .eq { fill: #193253; font-family: "Menlo", "Consolas", monospace; font-size: 14px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1900" height="1080" fill="url(#bg)"/>
  <rect class="panel" x="52" y="70" width="1796" height="962" rx="20"/>

  <text class="title" x="92" y="132">Advanced FDN Feedback Graph: TV-Unitary + DFM</text>
  <text class="subtitle" x="92" y="166">This graph isolates the loop internals for <tspan class="mono">--fdn-matrix tv_unitary</tspan> and <tspan class="mono">--fdn-dfm-delays-ms</tspan>.</text>

  <rect class="soft" x="92" y="212" width="1716" height="736" rx="16"/>

  <rect class="card" x="140" y="340" width="180" height="110" rx="12"/>
  <text class="label" x="230" y="392" text-anchor="middle">r[n]</text>
  <text class="small" x="230" y="416" text-anchor="middle">filtered line vector</text>

  <rect class="card" x="386" y="322" width="306" height="146" rx="12"/>
  <text class="h2" x="418" y="366">TV Matrix Builder</text>
  <text class="small" x="418" y="392">base M0 + target Q + phase blend</text>
  <text class="small" x="418" y="416">orthonormalize each block</text>
  <text class="small" x="418" y="440"><tspan class="mono">rate: --fdn-tv-rate-hz</tspan> / <tspan class="mono">depth: --fdn-tv-depth</tspan></text>

  <rect class="card" x="756" y="340" width="190" height="110" rx="12"/>
  <text class="label" x="851" y="392" text-anchor="middle">m[n] = M(t) r[n]</text>

  <rect class="card" x="1010" y="340" width="242" height="110" rx="12"/>
  <text class="label" x="1131" y="392" text-anchor="middle">RT60 Gains G</text>
  <text class="small" x="1131" y="416" text-anchor="middle">per-line decay scaling</text>

  <rect class="card" x="1316" y="316" width="332" height="158" rx="12"/>
  <text class="h2" x="1348" y="366">Optional DFM Branch</text>
  <text class="small" x="1348" y="392">read delayed feedback state</text>
  <text class="small" x="1348" y="416">write current scaled feedback</text>
  <text class="small" x="1348" y="440"><tspan class="mono">--fdn-dfm-delays-ms</tspan> (1 or N values)</text>

  <circle cx="1694" cy="395" r="35" fill="#ffffff" stroke="#5e7da6" stroke-width="2.2"/>
  <text class="label" x="1694" y="404" text-anchor="middle">+</text>

  <rect class="card" x="1244" y="222" width="268" height="66" rx="10"/>
  <text class="small" x="1378" y="262" text-anchor="middle">u[n] / sqrt(N) injection</text>

  <path class="line" d="M320,395 L386,395"/>
  <path class="line" d="M692,395 L756,395"/>
  <path class="line" d="M946,395 L1010,395"/>
  <path class="line" d="M1252,395 L1316,395"/>
  <path class="line" d="M1648,395 L1659,395"/>
  <path class="line" d="M1512,255 L1660,366"/>

  <rect class="card" x="1458" y="540" width="236" height="96" rx="12"/>
  <text class="label" x="1576" y="592" text-anchor="middle">x_fb[n+1]</text>

  <path class="line" d="M1694,430 L1694,540"/>
  <path class="loop" d="M1576,636 L1576,726 L230,726 L230,450"/>

  <rect class="panel" x="140" y="788" width="1620" height="132" rx="12"/>
  <text class="eq" x="174" y="836">M(t) = orthonormalize((1 - alpha(t)) * M0 + alpha(t) * Qtgt)</text>
  <text class="eq" x="174" y="862">alpha(t) = depth * 0.5 * (1 + sin(phase(t)))</text>
  <text class="eq" x="174" y="888">x_fb[n+1] = u[n]/sqrt(N) + DFM(G * M(t) * r[n])</text>
</svg>
