name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Hatch
        run: python -m pip install --upgrade pip hatch

      - name: Ruff
        run: hatch run lint

      - name: Pyright
        run: hatch run typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Hatch
        run: python -m pip install --upgrade pip hatch

      - name: Run tests with coverage
        run: hatch run test -- --cov=verbx --cov-report=term-missing --cov-fail-under=70

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: .coverage

  perf-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Hatch
        run: python -m pip install --upgrade pip hatch

      - name: Run benchmark baseline report
        run: |
          hatch run python scripts/benchmark_render_baseline.py \
            --baseline docs/benchmarks/ci_baseline.json \
            --json-out benchmark_report.json \
            --compare-threshold 3.0

      - name: Upload benchmark report
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: benchmark_report.json
