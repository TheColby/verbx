name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Hatch
        run: python -m pip install --upgrade pip hatch

      - name: Ruff
        run: hatch run lint

      - name: Pyright
        run: hatch run typecheck

      - name: Check autogenerated CLI reference
        run: hatch run python scripts/generate_cli_reference.py --check

      - name: Check launch-example parity
        run: hatch run python scripts/check_launch_examples.py --check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Hatch
        run: python -m pip install --upgrade pip hatch

      - name: Run tests with coverage
        run: hatch run test -- --cov=verbx --cov-report=term-missing --cov-fail-under=70

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: .coverage

  test-macos:
    name: Test (macOS / Apple Silicon)
    # macos-14 is guaranteed Apple Silicon (M1) — catches platform-specific regressions.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          brew update
          brew install libsndfile

      - name: Install Hatch
        run: python -m pip install --upgrade pip hatch

      - name: Run tests
        run: hatch run test -- --tb=short -q

  perf-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Hatch
        run: python -m pip install --upgrade pip hatch

      - name: Run benchmark baseline report
        run: |
          hatch run python scripts/benchmark_render_baseline.py \
            --baseline docs/benchmarks/ci_baseline.json \
            --json-out benchmark_report.json \
            --compare-threshold 3.0

      - name: Upload benchmark report
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: benchmark_report.json
