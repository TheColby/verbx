name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate artifacts
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/verbx
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Resolve publish auth mode
        id: auth
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          PYPI_TRUSTED_PUBLISHING: ${{ vars.PYPI_TRUSTED_PUBLISHING }}
          RELEASE_REQUIRE_PYPI: ${{ vars.RELEASE_REQUIRE_PYPI }}
        run: |
          required="${RELEASE_REQUIRE_PYPI:-true}"
          if [[ "${required}" != "true" && "${required}" != "false" ]]; then
            echo "Invalid RELEASE_REQUIRE_PYPI='${required}'. Use true or false." >&2
            exit 2
          fi
          echo "required=${required}" >> "$GITHUB_OUTPUT"

          if [ -n "${PYPI_API_TOKEN}" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
          elif [ "${PYPI_TRUSTED_PUBLISHING}" = "true" ]; then
            echo "mode=trusted" >> "$GITHUB_OUTPUT"
          else
            echo "mode=skip" >> "$GITHUB_OUTPUT"
          fi
          echo "resolved_mode=$(cat "$GITHUB_OUTPUT" | tail -n1)" >> "$GITHUB_STEP_SUMMARY"
          echo "required=${required}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when publish auth is unconfigured and publish is required
        if: steps.auth.outputs.mode == 'skip' && steps.auth.outputs.required == 'true'
        run: |
          {
            echo "PyPI publish REQUIRED but auth is unconfigured."
            echo "Configure one of:"
            echo "  1) Repository secret: PYPI_API_TOKEN"
            echo "  2) Repo variable: PYPI_TRUSTED_PUBLISHING=true with PyPI trusted publisher configured"
            echo "Or set RELEASE_REQUIRE_PYPI=false to allow skip."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "PyPI publish required but auth is missing." >&2
          exit 2

      - name: Skip publish when auth is unconfigured and publish is optional
        if: steps.auth.outputs.mode == 'skip' && steps.auth.outputs.required != 'true'
        run: |
          {
            echo "PyPI publish skipped: no auth configured."
            echo "Configure one of:"
            echo "  1) Repository secret: PYPI_API_TOKEN"
            echo "  2) Repo variable: PYPI_TRUSTED_PUBLISHING=true with PyPI trusted publisher configured"
            echo "Current policy: RELEASE_REQUIRE_PYPI=false"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "PYPI publish skipped."

      - name: Publish to PyPI (API token)
        if: steps.auth.outputs.mode == 'token'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish to PyPI (trusted publishing)
        if: steps.auth.outputs.mode == 'trusted'
        uses: pypa/gh-action-pypi-publish@release/v1

  sync-homebrew-tap:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Homebrew sync mode
        id: brew_sync
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_REQUIRE_HOMEBREW: ${{ vars.RELEASE_REQUIRE_HOMEBREW }}
        run: |
          required="${RELEASE_REQUIRE_HOMEBREW:-true}"
          if [[ "${required}" != "true" && "${required}" != "false" ]]; then
            echo "Invalid RELEASE_REQUIRE_HOMEBREW='${required}'. Use true or false." >&2
            exit 2
          fi
          echo "required=${required}" >> "$GITHUB_OUTPUT"

          if [ -n "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "mode=sync" >> "$GITHUB_OUTPUT"
          else
            echo "mode=skip" >> "$GITHUB_OUTPUT"
          fi
          echo "resolved_mode=$(cat "$GITHUB_OUTPUT" | tail -n1)" >> "$GITHUB_STEP_SUMMARY"
          echo "required=${required}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when Homebrew tap sync is required but token is unconfigured
        if: steps.brew_sync.outputs.mode == 'skip' && steps.brew_sync.outputs.required == 'true'
        run: |
          {
            echo "Homebrew tap sync REQUIRED but auth is unconfigured."
            echo "Configure repository secret: HOMEBREW_TAP_TOKEN"
            echo "Optional repo variable: HOMEBREW_TAP_REPO (default: TheColby/homebrew-verbx)"
            echo "Or set RELEASE_REQUIRE_HOMEBREW=false to allow skip."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Homebrew tap sync required but token is missing." >&2
          exit 2

      - name: Skip Homebrew tap sync when token is unconfigured and sync is optional
        if: steps.brew_sync.outputs.mode == 'skip' && steps.brew_sync.outputs.required != 'true'
        run: |
          {
            echo "Homebrew tap sync skipped: no auth configured."
            echo "Configure repository secret: HOMEBREW_TAP_TOKEN"
            echo "Optional repo variable: HOMEBREW_TAP_REPO (default: TheColby/homebrew-verbx)"
            echo "Current policy: RELEASE_REQUIRE_HOMEBREW=false"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Homebrew tap sync skipped."

      - name: Sync Homebrew formula to tap
        if: steps.brew_sync.outputs.mode == 'sync'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          TAP_REPO="${HOMEBREW_TAP_REPO:-TheColby/homebrew-verbx}"
          TAG="${GITHUB_REF_NAME}"
          FORMULA_SOURCE="packaging/homebrew/verbx.rb"
          FORMULA_TARGET="Formula/verbx.rb"

          if ! grep -q "refs/tags/${TAG}.tar.gz" "${FORMULA_SOURCE}"; then
            echo "Formula ${FORMULA_SOURCE} is not pinned to tag ${TAG}." >&2
            echo "Please refresh formula before tagging release." >&2
            exit 2
          fi

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p "tap/Formula"
          cp "${FORMULA_SOURCE}" "tap/${FORMULA_TARGET}"

          cd tap
          if git diff --quiet -- "${FORMULA_TARGET}"; then
            echo "No Homebrew formula changes to publish." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FORMULA_TARGET}"
          git commit -m "chore: update verbx formula for ${TAG}"
          git push
          echo "Published Homebrew formula update to ${TAP_REPO} for ${TAG}." >> "$GITHUB_STEP_SUMMARY"

  release-github:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, publish-pypi, sync-homebrew-tap]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.0
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
