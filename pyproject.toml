[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "verbx"
dynamic = ["version"]
description = "Extreme ambient audio reverberator"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
keywords = []
authors = [
  { name = "Your Name", email = "you@example.com" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
]
dependencies = [
  "typer",
  "rich",
  "numpy",
  "scipy",
  "soundfile",
  "librosa",
  "numba",
]

[project.scripts]
verbx = "verbx.cli:app"

[tool.hatch.version]
path = "src/verbx/__init__.py"

[tool.hatch.envs.default]
dependencies = [
  "pytest",
  "pytest-cov",
]
[tool.hatch.envs.default.scripts]
cov = "pytest --cov-report=term-missing --cov-config=pyproject.toml --cov=src/verbx --cov=tests {args}"
no-cov = "cov --no-cov {args}"

[[tool.hatch.envs.test.matrix]]
python = ["3.11", "3.12"]
